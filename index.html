<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Central de Compras — 3M Agropecuária</title>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --navy: #0f2942;
      --navy-light: #1e3f5c;
      --amber: #d99e2b;
      --amber-light: #f0c674;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1c2b3a;
      --muted: #6b7c8d;
      --border: #dde3e8;
      --danger: #b3432b;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; }
    .header { background: var(--navy); color: #fff; padding: 20px 28px; border-radius: 8px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left img { height: 34px; width: auto; display: block; }
    .header h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
    .header .user { font-size: 13px; color: var(--amber-light); text-align: right; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--navy); margin: 0 0 16px 0; border-bottom: 2px solid var(--amber); padding-bottom: 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 14px; font-family: inherit; background: #fff; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--navy-light); }
    textarea { resize: vertical; min-height: 44px; }
    .field { margin-bottom: 0; }
    .item-block { border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 14px; position: relative; background: #fbfcfd; }
    .item-block .item-num { position: absolute; top: -11px; left: 14px; background: var(--navy); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
    .item-block .remove-item { position: absolute; top: -11px; right: 14px; background: var(--danger); color: #fff; border: none; border-radius: 10px; font-size: 11px; padding: 3px 10px; cursor: pointer; }
    .tipo-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
    .tipo-toggle button { flex: 1; padding: 8px; border: 1px solid var(--border); background: #fff; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); }
    .tipo-toggle button.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .btn-add { background: none; border: 2px dashed var(--amber); color: var(--navy); padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn-add:hover { background: #fdf6e8; }
    .footer-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
    .btn-primary { background: var(--amber); color: var(--navy); border: none; padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; }
    .btn-primary:hover { background: var(--amber-light); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    #msg { display: none; padding: 14px 18px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
    #msg.ok { background: #e5f3e8; color: #256a3a; display: block; }
    #msg.err { background: #fbe7e3; color: var(--danger); display: block; }
    .foto-preview img { max-width: 120px; max-height: 120px; border-radius: 6px; margin-top: 8px; border: 1px solid var(--border); display: block; }
    .foto-preview .foto-erro { font-size: 12px; color: var(--danger); margin-top: 6px; }
    .navbar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .navbar button { background: #fff; border: 1px solid var(--border); color: var(--navy); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .navbar button.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .fila-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .fila-card .fila-titulo { font-size: 15px; font-weight: 700; color: var(--navy); margin: 0 0 4px 0; }
    .fila-card .fila-sub { font-size: 12px; color: var(--muted); margin: 0 0 14px 0; }
    .fornecedor-row { border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; background: #fbfcfd; }
    .fornecedor-row .grid3 { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 10px; }
    .fornecedor-escolha { display: flex; align-items: flex-start; gap: 10px; border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
    .fornecedor-escolha.selecionado { border-color: var(--amber); background: #fdf6e8; }
    .fornecedor-escolha input { margin-top: 3px; }
    .fornecedor-escolha .info { font-size: 13px; }
    .fornecedor-escolha .info b { color: var(--navy); }
    .badge-tag { display: inline-block; background: var(--amber); color: var(--navy); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .dash-metric { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .dash-metric .num { font-size: 24px; font-weight: 700; color: var(--navy); }
    .dash-metric .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .btn-secondary { background: #fff; border: 1px solid var(--border); color: var(--navy); padding: 10px 18px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; }
    #loginScreen {
      max-width: 380px;
      margin: 80px auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 40px 32px;
      text-align: center;
    }
    #loginScreen h1 { font-size: 18px; color: var(--navy); margin-bottom: 6px; }
    #loginScreen p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    #googleSignInButton { display: flex; justify-content: center; }
    #loginErro { color: var(--danger); font-size: 13px; margin-top: 16px; display: none; }
    #appScreen { display: none; }
  </style>
</head>

    <p>Entre com sua conta @3m.agr.br para continuar</p>

    <div id="loginErro"></div>
  </div>

    <div class="user" id="userInfo">Carregando usuário...</div>
  </div>

  <div class="navbar" id="navbar"></div>

  <div id="msg"></div>

  <div id="view-solicitacao" class="view">
    <div class="card">
      <h2>Dados da Solicitação</h2>
      <div class="grid">
        <div class="field">
          <label>Fazenda de destino</label>
          <input type="text" id="fazenda" placeholder="Ex: Fazenda São Geraldo">
        </div>
        <div class="field">
          <label>Prioridade</label>
          <select id="prioridade">
            <option value="Alto">Alto</option>
            <option value="Médio" selected>Médio</option>
            <option value="Baixo">Baixo</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Itens da Solicitação</h2>
      <div id="itensContainer"></div>
      <button class="btn-add" id="btnAddItem" type="button">+ Adicionar item</button>
    </div>

    <div class="footer-actions">
      <button class="btn-primary" id="btnEnviar" type="button">Enviar solicitação</button>
    </div>
  </div>

  <div id="view-minhas" class="view" style="display:none;">
    <div id="minhasContainer"></div>
  </div>

  <div id="view-cotacao" class="view" style="display:none;">
    <div id="cotacaoContainer"></div>
  </div>

  <div id="view-suprimentos" class="view" style="display:none;">
    <div id="suprimentosContainer"></div>
  </div>

  <div id="view-financeiro" class="view" style="display:none;">
    <div id="financeiroContainer"></div>
  </div>

  <div id="view-dashboard" class="view" style="display:none;">
    <div class="card" style="margin-bottom:16px;">
      <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap:14px; align-items:end;">
        <div class="field"><label>De</label><input type="date" id="dashDataInicio"></div>
        <div class="field"><label>Até</label><input type="date" id="dashDataFim"></div>
        <div class="field"><label>Pessoa</label><select id="dashPessoa"><option value="">Todos</option></select></div>
        <div style="display:flex; gap:8px;">
          <button class="btn-primary" style="width:100%;" onclick="carregarDashboard()">Aplicar filtro</button>
          <button class="btn-secondary" onclick="baixarDashboardPDF()">Baixar PDF</button>
        </div>
      </div>
    </div>
    <div id="dashboardContainer"></div>
  </div>

  <script>
    const CATEGORIAS_FALLBACK = ['SANIDADE','MANUTENÇÃO PECUÁRIA','OBRAS E INFRAESTRUTURAS','DESPESAS ADMINISTRATIVAS','MANUTENÇÃO AGRICULTURA','E.P.I','COMBUSTÍVEL','SEDE','VEÍCULOS PECUÁRIA','VEÍCULOS AGRICULTURA','SEGUROS','VEÍCULOS ADMINISTRATIVO'];
    let categorias = CATEGORIAS_FALLBACK;
    let itemCount = 0;
    const itemFotos = {};
    const TAMANHO_MAX_FOTO_MB = 5;

    function itemTemplate(id) {
      return (
        '<div class="item-block" data-id="' + id + '">' +
          '<span class="item-num">Item ' + id + '</span>' +
          '<button class="remove-item" type="button" onclick="removerItem(' + id + ')">remover</button>' +
          '<div class="tipo-toggle">' +
            '<button type="button" class="tipo-btn active" data-tipo="Produto" onclick="setTipo(' + id + ',\'Produto\')">Produto</button>' +
            '<button type="button" class="tipo-btn" data-tipo="Servico" onclick="setTipo(' + id + ',\'Servico\')">Serviço de Terceiro</button>' +
          '</div>' +
          '<input type="hidden" class="f-tipo" value="Produto">' +
          '<div class="grid" style="margin-bottom:12px;">' +
            '<div class="field" style="grid-column: span 2;">' +
              '<label class="lbl-descricao">Descrição do item</label>' +
              '<input type="text" class="f-descricao" placeholder="Ex: Cimento CP-II">' +
            '</div>' +
          '</div>' +
          '<div class="grid" style="margin-bottom:12px;">' +
            '<div class="field campo-qtd">' +
              '<label>Quantidade</label>' +
              '<input type="text" class="f-quantidade" placeholder="Ex: 120">' +
            '</div>' +
            '<div class="field">' +
              '<label>Categoria</label>' +
              '<select class="f-categoria"></select>' +
            '</div>' +
          '</div>' +
          '<div class="field" style="margin-bottom:12px;">' +
            '<label>Justificativa / necessidade da compra</label>' +
            '<textarea class="f-justificativa" placeholder="Por que essa compra é necessária?"></textarea>' +
          '</div>' +
          '<div class="field" style="margin-bottom:12px;">' +
            '<label>Complementos (opcional)</label>' +
            '<input type="text" class="f-complementos" placeholder="Observações adicionais">' +
          '</div>' +
          '<div class="field">' +
            '<label>Foto do produto (opcional)</label>' +
            '<input type="file" accept="image/*" class="f-foto" onchange="handleFotoChange(' + id + ', this)">' +
            '<div class="foto-preview" id="preview-' + id + '"></div>' +
          '</div>' +
        '</div>'
      );
    }

    function preencherCategorias(select) {
      select.innerHTML = categorias.map(c => '<option value="' + c + '">' + c + '</option>').join('');
    }

    function adicionarItem() {
      itemCount++;
      const container = document.getElementById('itensContainer');
      const wrapper = document.createElement('div');
      wrapper.innerHTML = itemTemplate(itemCount);
      const block = wrapper.firstElementChild;
      container.appendChild(block);
      preencherCategorias(block.querySelector('.f-categoria'));
    }

    function removerItem(id) {
      const block = document.querySelector('.item-block[data-id="' + id + '"]');
      if (block) block.remove();
      delete itemFotos[id];
    }

    function setTipo(id, tipo) {
      const block = document.querySelector('.item-block[data-id="' + id + '"]');
      block.querySelector('.f-tipo').value = tipo;
      block.querySelectorAll('.tipo-btn').forEach(b => b.classList.toggle('active', b.dataset.tipo === tipo));
      const campoQtd = block.querySelector('.campo-qtd');
      const lblDescricao = block.querySelector('.lbl-descricao');
      if (tipo === 'Servico') {
        campoQtd.style.display = 'none';
        lblDescricao.textContent = 'Escopo do serviço';
      } else {
        campoQtd.style.display = 'block';
        lblDescricao.textContent = 'Descrição do item';
      }
    }

    function handleFotoChange(id, input) {
      const preview = document.getElementById('preview-' + id);
      preview.innerHTML = '';
      const file = input.files[0];
      if (!file) { delete itemFotos[id]; return; }

      if (file.size > TAMANHO_MAX_FOTO_MB * 1024 * 1024) {
        preview.innerHTML = '<div class="foto-erro">Foto maior que ' + TAMANHO_MAX_FOTO_MB + 'MB — escolha uma imagem menor.</div>';
        input.value = '';
        delete itemFotos[id];
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        itemFotos[id] = { base64: base64, mimeType: file.type, nomeArquivo: file.name };
        preview.innerHTML = '<img src="' + dataUrl + '">';
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('btnAddItem').addEventListener('click', adicionarItem);

    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('msg');
      el.textContent = texto;
      el.className = tipo;
    }

    // Rede de segurança: se qualquer erro de JavaScript acontecer (ex: ao desenhar uma
    // tela com dados inesperados), mostra na tela em vez de ficar travado em "Carregando..."
    // sem explicação nenhuma.
    window.addEventListener('error', function(evento) {
      mostrarMsg('Erro ao carregar a tela: ' + evento.message + ' (linha ' + evento.lineno + ')', 'err');
      document.querySelectorAll('.view').forEach(function(view) {
        if (view.style.display !== 'none') {
          const containers = view.querySelectorAll('[id$="Container"]');
          containers.forEach(function(c) {
            if (c.innerHTML.indexOf('Carregando') !== -1) {
              c.innerHTML = '<div class="empty-state">Erro ao carregar — veja a mensagem no topo da tela.</div>';
            }
          });
        }
      });
    });

    // =====================================================================
    // CONEXÃO COM A API (Apps Script) + LOGIN GOOGLE
    // =====================================================================
    const API_URL = 'https://script.google.com/a/macros/3m.agr.br/s/AKfycbwRRW_8BgZiGML-EaMRueWuq_zKQJcHFJKXCCh3QrZ4aKDsD2tXb1_uvOSflj5lGCsX/exec';
    const GOOGLE_CLIENT_ID = '650175155859-mi42ql7k3247oo8q4qm939k8c3i0es59.apps.googleusercontent.com';
    let tokenAtual = null;

    // Se veio de um link de e-mail (?codigo=OC-XXX-26&view=cotacao), guarda pra
    // abrir direto na tela certa e destacar a OC assim que logar.
    const _paramsUrl = new URLSearchParams(window.location.search);
    const codigoAlvo = _paramsUrl.get('codigo');
    const viewAlvoInicial = _paramsUrl.get('view');
    let jaDestacouAlvo = false;

    /**
     * Chama a API do Apps Script. Retorna uma Promise com os dados (já sem o
     * envelope {ok, dados}) — dá pra usar com .then()/.catch() normalmente.
     * Usa text/plain de propósito: evita o preflight de CORS que travaria a
     * chamada num Web App do Apps Script.
     */
    function chamarApi(action, payload) {
      return fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: action, token: tokenAtual, payload: payload || null }),
      })
        .then(function(r) { return r.json(); })
        .then(function(resposta) {
          if (!resposta.ok) throw new Error(resposta.erro || 'Erro desconhecido na API.');
          return resposta.dados;
        });
    }

    function handleCredentialResponse(resposta) {
      tokenAtual = resposta.credential;
      document.getElementById('loginErro').style.display = 'none';

      chamarApi('getContextoInicial')
        .then(function(ctx) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appScreen').style.display = 'block';
          document.getElementById('userInfo').textContent = ctx.usuario.nome + ' · ' + ctx.usuario.setor;
          if (ctx.categorias && ctx.categorias.length) categorias = ctx.categorias;
          document.querySelectorAll('.f-categoria').forEach(preencherCategorias);
          capacidadesAtuais = ctx.capacidades;
          construirNavbar(ctx);
          const temAbaAlvo = viewAlvoInicial && document.querySelector('#navbar button[data-view="' + viewAlvoInicial + '"]');
          mudarView(temAbaAlvo ? viewAlvoInicial : 'solicitacao');
          if (itemCount === 0) adicionarItem();
        })
        .catch(function(erro) {
          const el = document.getElementById('loginErro');
          el.textContent = erro.message;
          el.style.display = 'block';
          tokenAtual = null;
        });
    }

    window.onload = function() {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
      });
      google.accounts.id.renderButton(
        document.getElementById('googleSignInButton'),
        { theme: 'outline', size: 'large', text: 'signin_with', locale: 'pt_BR' }
      );
    };

    function coletarPayload() {
      const itens = [];
      document.querySelectorAll('.item-block').forEach(block => {
        const id = block.dataset.id;
        itens.push({
          tipo: block.querySelector('.f-tipo').value,
          descricao: block.querySelector('.f-descricao').value.trim(),
          quantidade: block.querySelector('.f-quantidade').value.trim(),
          categoria: block.querySelector('.f-categoria').value,
          justificativa: block.querySelector('.f-justificativa').value.trim(),
          complementos: block.querySelector('.f-complementos').value.trim(),
          foto: itemFotos[id] || null,
        });
      });
      return {
        fazenda: document.getElementById('fazenda').value.trim(),
        prioridade: document.getElementById('prioridade').value,
        itens: itens,
      };
    }

    function validar(payload) {
      if (payload.itens.length === 0) return 'Adicione pelo menos um item.';
      for (const item of payload.itens) {
        if (!item.descricao) return 'Preencha a descrição de todos os itens.';
        if (item.tipo === 'Produto' && !item.quantidade) return 'Preencha a quantidade de todos os produtos.';
      }
      return null;
    }

    document.getElementById('btnEnviar').addEventListener('click', function() {
      const payload = coletarPayload();
      const erro = validar(payload);
      if (erro) { mostrarMsg(erro, 'err'); return; }

      const btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      chamarApi('criarSolicitacao', payload)
        .then(function(resultado) {
          mostrarMsg('Solicitação ' + resultado.codigo + ' criada com sucesso (' + resultado.itens.length + ' item(ns)).', 'ok');
          document.getElementById('itensContainer').innerHTML = '';
          Object.keys(itemFotos).forEach(k => delete itemFotos[k]);
          itemCount = 0;
          adicionarItem();
          btn.disabled = false;
          btn.textContent = 'Enviar solicitação';
        })
        .catch(function(erro) {
          mostrarMsg('Erro ao enviar: ' + erro.message, 'err');
          btn.disabled = false;
          btn.textContent = 'Enviar solicitação';
        });
    });

    let capacidadesAtuais = {};

    function construirNavbar(ctx) {
      const abas = [{ id: 'solicitacao', label: 'Nova Solicitação' }, { id: 'minhas', label: 'Minhas Solicitações' }];
      if (ctx.capacidades.podeCotar) abas.push({ id: 'cotacao', label: 'Fila de Cotação' });
      if (ctx.capacidades.podeAprovarSuprimentos) abas.push({ id: 'suprimentos', label: 'Aprovação Suprimentos' });
      if (ctx.capacidades.podeAprovarFinanceiro) abas.push({ id: 'financeiro', label: 'Aprovação Financeira' });
      if (ctx.capacidades.podeVerDashboard) abas.push({ id: 'dashboard', label: 'Dashboard' });

      const nav = document.getElementById('navbar');
      nav.innerHTML = abas.map(function(aba) {
        return '<button data-view="' + aba.id + '" onclick="mudarView(\'' + aba.id + '\')">' + aba.label + '</button>';
      }).join('');
    }

    function mudarView(viewId) {
      document.querySelectorAll('.view').forEach(function(v) { v.style.display = 'none'; });
      document.getElementById('view-' + viewId).style.display = 'block';
      document.querySelectorAll('#navbar button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.view === viewId);
      });
      document.getElementById('msg').style.display = 'none';

      if (viewId === 'minhas') carregarMinhasSolicitacoes();
      if (viewId === 'cotacao') carregarFilaCotacao();
      if (viewId === 'suprimentos') carregarFilaSuprimentos();
      if (viewId === 'financeiro') carregarFilaFinanceiro();
      if (viewId === 'dashboard') carregarDashboard();
    }

    // =====================================================================
    // MINHAS SOLICITAÇÕES (Solicitante)
    // =====================================================================

    function carregarMinhasSolicitacoes() {
      const container = document.getElementById('minhasContainer');
      container.innerHTML = '<div class="empty-state">Carregando...</div>';
      chamarApi('listarMinhasSolicitacoes')
        .then(renderMinhasSolicitacoes)
        .catch(function(erro) { container.innerHTML = '<div class="empty-state">' + erro.message + '</div>'; });
    }

    function statusResumo(item) {
      if (item.statusCompra === 'Compra aprovada') return 'Compra aprovada';
      if (item.statusCompra === 'Compra reprovada') return 'Compra reprovada';
      return item.statusCotacao || 'Aguardando cotação';
    }

    function renderMinhasSolicitacoes(itens) {
      const container = document.getElementById('minhasContainer');
      if (!itens.length) { container.innerHTML = '<div class="empty-state">Você ainda não fez nenhuma solicitação.</div>'; return; }

      container.innerHTML = itens.map(function(item) {
        const camposEdicao = item.editavel ? (
          '<div class="footer-actions" style="justify-content:flex-start;">' +
            '<button class="btn-secondary" onclick="abrirEdicao(\'' + item.idItem + '\')">Editar</button>' +
            '<button class="btn-secondary" style="color:var(--danger);border-color:var(--danger);" onclick="abrirRemocao(\'' + item.idItem + '\')">Remover</button>' +
          '</div>' +
          '<div class="edicao-form" id="edicao-' + item.idItem + '" style="display:none;margin-top:12px;">' +
            '<div class="grid" style="margin-bottom:12px;">' +
              '<div class="field"><label>Descrição</label><input type="text" class="ed-descricao" value="' + item.descricao + '"></div>' +
              '<div class="field"><label>Quantidade</label><input type="text" class="ed-quantidade" value="' + (item.quantidade || '') + '"></div>' +
            '</div>' +
            '<div class="grid" style="margin-bottom:12px;">' +
              '<div class="field"><label>Categoria</label><select class="ed-categoria f-categoria"></select></div>' +
              '<div class="field"><label>Prioridade</label>' +
                '<select class="ed-prioridade">' +
                  '<option value="Alto"' + (item.prioridade === 'Alto' ? ' selected' : '') + '>Alto</option>' +
                  '<option value="Médio"' + (item.prioridade === 'Médio' ? ' selected' : '') + '>Médio</option>' +
                  '<option value="Baixo"' + (item.prioridade === 'Baixo' ? ' selected' : '') + '>Baixo</option>' +
                '</select>' +
              '</div>' +
            '</div>' +
            '<div class="field" style="margin-bottom:12px;"><label>Justificativa</label><textarea class="ed-justificativa">' + (item.justificativa || '') + '</textarea></div>' +
            '<div class="field" style="margin-bottom:12px;"><label>Complementos</label><input type="text" class="ed-complementos" value="' + (item.complementos || '') + '"></div>' +
            '<div class="field" style="margin-bottom:12px;"><label>Fazenda</label><input type="text" class="ed-fazenda" value="' + (item.fazenda || '') + '"></div>' +
            '<div class="field" style="margin-bottom:12px;"><label>Motivo da alteração (obrigatório)</label><textarea class="ed-motivo" placeholder="Por que está alterando essa solicitação?"></textarea></div>' +
            '<div class="footer-actions">' +
              '<button class="btn-primary" onclick="salvarEdicaoItem(\'' + item.idItem + '\')">Salvar alterações</button>' +
            '</div>' +
          '</div>' +
          '<div class="edicao-form" id="remocao-' + item.idItem + '" style="display:none;margin-top:12px;">' +
            '<div class="field" style="margin-bottom:12px;"><label>Motivo da remoção (obrigatório)</label><textarea class="rm-motivo" placeholder="Por que está removendo essa solicitação?"></textarea></div>' +
            '<div class="footer-actions">' +
              '<button class="btn-primary" style="background:var(--danger);" onclick="confirmarRemocao(\'' + item.idItem + '\')">Confirmar remoção</button>' +
            '</div>' +
          '</div>'
        ) : '';

        return (
          '<div class="fila-card" data-id-item="' + item.idItem + '" data-codigo="' + item.codigo + '" data-categoria-atual="' + item.categoria + '">' +
            '<div class="fila-titulo">' + item.descricao + '<span class="badge-tag">' + item.idItem + '</span></div>' +
            '<div class="fila-sub">' + item.categoria + (item.quantidade ? ' · Qtd: ' + item.quantidade : '') + ' · ' + statusResumo(item) + '</div>' +
            camposEdicao +
          '</div>'
        );
      }).join('');

      document.querySelectorAll('.ed-categoria').forEach(function(sel) {
        preencherCategorias(sel);
        const card = sel.closest('.fila-card');
        sel.value = card.dataset.categoriaAtual;
      });

      destacarItemAlvo_('#view-minhas');
    }

    /**
     * Destaque genérico (fora da Fila de Cotação, que já tem seu próprio expand):
     * acha o primeiro .fila-card com o código vindo do link do e-mail, dentro da
     * view indicada, e rola/realça ele — só na primeira vez.
     */
    function destacarItemAlvo_(seletorView) {
      if (!codigoAlvo || jaDestacouAlvo) return;
      const card = document.querySelector(seletorView + ' .fila-card[data-codigo="' + codigoAlvo + '"]');
      if (!card) return;
      jaDestacouAlvo = true;
      card.style.outline = '2px solid var(--amber)';
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function abrirEdicao(idItem) {
      document.getElementById('remocao-' + idItem).style.display = 'none';
      const bloco = document.getElementById('edicao-' + idItem);
      bloco.style.display = bloco.style.display === 'none' ? 'block' : 'none';
    }

    function abrirRemocao(idItem) {
      document.getElementById('edicao-' + idItem).style.display = 'none';
      const bloco = document.getElementById('remocao-' + idItem);
      bloco.style.display = bloco.style.display === 'none' ? 'block' : 'none';
    }

    function confirmarRemocao(idItem) {
      const bloco = document.getElementById('remocao-' + idItem);
      const motivo = bloco.querySelector('.rm-motivo').value.trim();
      if (!motivo) { mostrarMsg('Preciso do motivo da remoção.', 'err'); return; }

      chamarApi('removerItem', { idItem: idItem, motivo: motivo })
        .then(function() {
          mostrarMsg('Solicitação removida.', 'ok');
          carregarMinhasSolicitacoes();
        })
        .catch(function(erro) { mostrarMsg('Erro: ' + erro.message, 'err'); });
    }

    function salvarEdicaoItem(idItem) {
      const bloco = document.getElementById('edicao-' + idItem);
      const motivo = bloco.querySelector('.ed-motivo').value.trim();
      if (!motivo) { mostrarMsg('Preciso do motivo da alteração.', 'err'); return; }

      const novosDados = {
        descricao: bloco.querySelector('.ed-descricao').value.trim(),
        quantidade: bloco.querySelector('.ed-quantidade').value.trim(),
        categoria: bloco.querySelector('.ed-categoria').value,
        prioridade: bloco.querySelector('.ed-prioridade').value,
        justificativa: bloco.querySelector('.ed-justificativa').value.trim(),
        complementos: bloco.querySelector('.ed-complementos').value.trim(),
        fazenda: bloco.querySelector('.ed-fazenda').value.trim(),
      };

      chamarApi('editarItem', { idItem: idItem, novosDados: novosDados, motivo: motivo })
        .then(function() {
          mostrarMsg('Solicitação atualizada.', 'ok');
          carregarMinhasSolicitacoes();
        })
        .catch(function(erro) { mostrarMsg('Erro: ' + erro.message, 'err'); });
    }

    // =====================================================================
    // FILA DE COTAÇÃO (Comprador)
    // =====================================================================

    function carregarFilaCotacao() {
      const container = document.getElementById('cotacaoContainer');
      container.innerHTML = '<div class="empty-state">Carregando...</div>';
      chamarApi('listarFilaCotacao')
        .then(renderFilaCotacao)
        .catch(function(erro) { container.innerHTML = '<div class="empty-state">' + erro.message + '</div>'; });
    }

    /**
     * Converte o link do Drive (gerado por arquivo.getUrl()) num link de miniatura
     * que o navegador consegue exibir direto num <img>. Se não conseguir extrair o
     * ID do arquivo, retorna null (aí o link vira só texto "Ver foto anexada").
     */
    function urlMiniaturaDrive_(url) {
      if (!url) return null;
      const match = url.match(/\/d\/([^/]+)/);
      if (!match) return null;
      return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w300';
    }

    function toggleOC(codigo) {
      const el = document.getElementById('oc-detalhe-' + codigo);
      const seta = document.getElementById('seta-' + codigo);
      const abrir = el.style.display === 'none';
      el.style.display = abrir ? 'block' : 'none';
      seta.textContent = abrir ? '⌄' : '›';
    }

    /**
     * Se veio de um link de e-mail (?codigo=...), abre e rola até essa OC
     * automaticamente — só na primeira vez que a tela carrega.
     */
    function destacarOCAlvo_(codigo) {
      if (!codigo || jaDestacouAlvo) return;
      const grupo = document.querySelector('.oc-group[data-codigo="' + codigo + '"]');
      if (!grupo) return;
      jaDestacouAlvo = true;
      toggleOC(codigo);
      grupo.style.outline = '2px solid var(--amber)';
      grupo.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function salvarCotacaoOC(codigo, finalizar) {
      const grupo = document.querySelector('.oc-group[data-codigo="' + codigo + '"]');
      const blocos = grupo.querySelectorAll('.item-cotacao-block');
      const itensFornecedores = Array.from(blocos).map(function(bloco) {
        const linhas = bloco.querySelectorAll('.fornecedor-row');
        return {
          idItem: bloco.dataset.idItem,
          fornecedores: Array.from(linhas).map(function(linha) {
            return {
              nome: linha.querySelector('.f-nome').value.trim(),
              valor: linha.querySelector('.f-valor').value.trim(),
              prazo: linha.querySelector('.f-prazo').value.trim(),
              pagamento: linha.querySelector('.f-pagamento').value.trim(),
            };
          }),
        };
      });

      if (finalizar) {
        const faltando = itensFornecedores.some(function(it) {
          return it.fornecedores.every(function(f) { return !f.nome; });
        });
        if (faltando) { mostrarMsg('Preencha pelo menos um fornecedor em cada item antes de finalizar.', 'err'); return; }
      }

      chamarApi('salvarCotacaoLote', { codigo: codigo, itensFornecedores: itensFornecedores, finalizar: finalizar })
        .then(function() {
          mostrarMsg(finalizar ? 'Cotação finalizada.' : 'Rascunho salvo.', 'ok');
          carregarFilaCotacao();
        })
        .catch(function(erro) { mostrarMsg('Erro: ' + erro.message, 'err'); });
    }

    /**
     * Finaliza só este item, mesmo que a OC tenha outros produtos ainda não
     * cotados (útil quando cada produto vai ficar com um fornecedor diferente
     * e nem todos ficam prontos ao mesmo tempo).
     */
    function finalizarItemCotacao(idItem) {
      const bloco = document.querySelector('.item-cotacao-block[data-id-item="' + idItem + '"]');
      const linhas = bloco.querySelectorAll('.fornecedor-row');
      const fornecedores = Array.from(linhas).map(function(linha) {
        return {
          nome: linha.querySelector('.f-nome').value.trim(),
          valor: linha.querySelector('.f-valor').value.trim(),
          prazo: linha.querySelector('.f-prazo').value.trim(),
          pagamento: linha.querySelector('.f-pagamento').value.trim(),
        };
      });

      if (fornecedores.every(function(f) { return !f.nome; })) {
        mostrarMsg('Preencha pelo menos um fornecedor antes de finalizar.', 'err');
        return;
      }

      chamarApi('finalizarItemCotacao', { idItem: idItem, fornecedores: fornecedores })
        .then(function() {
          mostrarMsg('Item finalizado.', 'ok');
          carregarFilaCotacao();
        })
        .catch(function(erro) { mostrarMsg('Erro: ' + erro.message, 'err'); });
    }

    function toggleReprovarCotacao(idItem) {
      const bloco = document.getElementById('reprova-cot-' + idItem);
      bloco.style.display = bloco.style.display === 'none' ? 'block' : 'none';
    }

    function confirmarReprovarCotacao(idItem) {
      const bloco = document.getElementById('reprova-cot-' + idItem);

            '</div>' +
            '<div class="grid" style="margin-top:12px;">' +
              '<div class="field"><label>Número da NF (opcional)</label><input type="text" class="f-numero-nf" placeholder="Ex: 65989"></div>' +
              '<div class="field"><label>Comprovante/NF (opcional, pode selecionar mais de um)</label><input type="file" accept="image/*,application/pdf" multiple class="f-comprovante"></div>' +

    function confirmarReprovarFinanceiro(idItem) {
      const bloco = document.getElementById('reprova-fin-' + idItem);
      const motivo = bloco.querySelector('.f-motivo-reprova').value.trim();
      if (!motivo) { mostrarMsg('Preciso do motivo da reprovação.', 'err'); return; }
      chamarApi('reprovarItemFinanceiro', { idItem: idItem, motivo: motivo })
        .then(function() { mostrarMsg('Compra reprovada.', 'ok'); carregarFilaFinanceiro(); })
        .catch(function(erro) { mostrarMsg('Erro: ' + erro.message, 'err'); });
    }

    function selecionarFornecedorFinanceiro(label, idItem, eraEscolhaSuprimentos) {
      const grupo = label.closest('.fila-card').querySelectorAll('.fornecedor-escolha');
      grupo.forEach(function(l) { l.classList.remove('selecionado'); });
      label.classList.add('selecionado');
      label.querySelector('input').checked = true;
      document.getElementById('motivo-' + idItem).style.display = eraEscolhaSuprimentos ? 'none' : 'block';
    }

    function aprovarFinanceiro(idItem) {
      const card = document.querySelector('#view-financeiro .fila-card[data-id-item="' + idItem + '"]');
      const selecionado = card.querySelector('input[type="radio"]:checked');
      if (!selecionado) { mostrarMsg('Escolha um fornecedor antes de aprovar.', 'err'); return; }

      const trocou = selecionado.dataset.escolhaSuprimentos === 'false';
      const motivo = card.querySelector('.f-motivo').value.trim();
      if (trocou && !motivo) { mostrarMsg('Explica o motivo da troca de fornecedor antes de aprovar.', 'err'); return; }

      const numeroNF = card.querySelector('.f-numero-nf').value.trim();
      const arquivosComprovante = Array.from(card.querySelector('.f-comprovante').files);

      function enviarAprovacao(comprovantes) {
        chamarApi('aprovarItemFinanceiro', {
          idItem: idItem,
          fornecedorFinal: parseInt(selecionado.value, 10),
          motivoTroca: motivo,
          numeroNF: numeroNF,
          comprovantes: comprovantes,
        })
          .then(function() {
            mostrarMsg('Compra aprovada.', 'ok');
            carregarFilaFinanceiro();
          })
          .catch(function(erro) { mostrarMsg('Erro: ' + erro.message, 'err'); });
      }

      if (arquivosComprovante.length) {
        const leituras = arquivosComprovante.map(function(arquivo) {
          return new Promise(function(resolve) {
            const reader = new FileReader();
            reader.onload = function(e) {
              resolve({ base64: e.target.result.split(',')[1], mimeType: arquivo.type, nomeArquivo: arquivo.name });
            };
            reader.readAsDataURL(arquivo);
          });
        });
        Promise.all(leituras).then(enviarAprovacao);
      } else {
        enviarAprovacao([]);
      }
    }

    let dashboardPessoasCarregadas = false;

    function carregarDashboard() {
      const container = document.getElementById('dashboardContainer');
      container.innerHTML = '<div class="empty-state">Carregando...</div>';

      const filtros = {
        dataInicio: document.getElementById('dashDataInicio').value || null,
        dataFim: document.getElementById('dashDataFim').value || null,
        pessoa: document.getElementById('dashPessoa').value || null,
      };

      chamarApi('getDashboard', filtros)
        .then(function(dados) {
          if (!dashboardPessoasCarregadas) {
            const sel = document.getElementById('dashPessoa');
            dados.pessoas.forEach(function(nome) {
              const opt = document.createElement('option');
              opt.value = nome;
              opt.textContent = nome;
              sel.appendChild(opt);
            });
            dashboardPessoasCarregadas = true;
          }
          renderDashboard(dados);
        })
        .catch(function(erro) { container.innerHTML = '<div class="empty-state">' + erro.message + '</div>'; });
    }

    function blocoGrafico(titulo, mapa, corBarra, formatarValor) {
      const entradas = Object.keys(mapa).map(function(k) { return [k, mapa[k]]; }).sort(function(a, b) { return b[1] - a[1]; });
      if (!entradas.length) return '<div class="card"><h2>' + titulo + '</h2><div class="empty-state">Sem dados no período.</div></div>';
      const maior = entradas.reduce(function(m, e) { return Math.max(m, e[1]); }, 1);

      const barras = entradas.map(function(e) {
        const pct = Math.round((e[1] / maior) * 100);
        const valorTexto = formatarValor ? formatarValor(e[1]) : e[1];
        return (
          '<div style="margin-bottom:10px;">' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text);margin-bottom:3px;">' +
              '<span>' + e[0] + '</span><span style="font-weight:700;">' + valorTexto + '</span>' +
            '</div>' +
            '<div style="background:#eef1f4;border-radius:4px;height:10px;overflow:hidden;">' +
              '<div style="background:' + corBarra + ';height:100%;width:' + pct + '%;"></div>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      return '<div class="card"><h2>' + titulo + '</h2>' + barras + '</div>';
    }

    function formatarReais(v) {
      return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatarDias(v) {
      if (v === null || v === undefined) return '—';
      if (v < 1) return Math.round(v * 24) + 'h';
      return v.toFixed(1) + ' dias';
    }

    function tabelaRanking(titulo, linhas, formatarValor) {
      if (!linhas.length) return '<div class="card"><h2>' + titulo + '</h2><div class="empty-state">Sem dados no período.</div></div>';
      const corpo = linhas.map(function(l, i) {
        return (
          '<tr>' +
            '<td style="padding:8px 4px;color:var(--muted);font-size:12px;">' + (i + 1) + 'º</td>' +
            '<td style="padding:8px 4px;font-size:13px;color:var(--text);">' + l[0] + '</td>' +
            '<td style="padding:8px 4px;font-size:13px;font-weight:700;color:var(--navy);text-align:right;">' + formatarValor(l[1]) + '</td>' +
          '</tr>'
        );
      }).join('');
      return '<div class="card"><h2>' + titulo + '</h2><table style="width:100%;border-collapse:collapse;">' + corpo + '</table></div>';
    }

    function renderDashboard(dados) {
      const container = document.getElementById('dashboardContainer');

      const mesesOrdenados = Object.keys(dados.porMes).sort();
      const cardsMes = mesesOrdenados.map(function(mes) {
        const info = dados.porMes[mes];
        return (
          '<div class="dash-metric">' +
            '<div class="num" style="font-size:18px;">' + formatarReais(info.gasto) + '</div>' +
            '<div class="lbl">' + mes + ' · ' + info.qtd + ' compra(s)</div>' +
          '</div>'
        );
      }).join('');

      container.innerHTML =
        '<div class="dash-grid">' +
          '<div class="dash-metric"><div class="num">' + dados.totalItens + '</div><div class="lbl">Total de itens</div></div>' +
          '<div class="dash-metric"><div class="num">' + (dados.porStatusCompra['Compra aprovada'] || 0) + '</div><div class="lbl">Compras aprovadas</div></div>' +
          '<div class="dash-metric"><div class="num">' + (dados.porStatusCompra['Compra reprovada'] || 0) + '</div><div class="lbl">Compras reprovadas</div></div>' +
          '<div class="dash-metric"><div class="num">' + (dados.porStatusCompra['(pendente)'] || 0) + '</div><div class="lbl">Ainda em andamento</div></div>' +
          '<div class="dash-metric"><div class="num" style="color:#256a3a;">' + formatarReais(dados.gastoTotal) + '</div><div class="lbl">Gasto total aprovado</div></div>' +
        '</div>' +

        '<h2 style="font-size:14px;color:var(--navy);margin:24px 0 10px 0;">Tempo médio por etapa</h2>' +
        '<div class="dash-grid">' +
          '<div class="dash-metric"><div class="num" style="font-size:18px;">' + formatarDias(dados.tempos.solicitacaoParaCotacao) + '</div><div class="lbl">Solicitação → fim da cotação</div></div>' +
          '<div class="dash-metric"><div class="num" style="font-size:18px;">' + formatarDias(dados.tempos.cotacaoParaSuprimentos) + '</div><div class="lbl">Cotação → aprovação Suprimentos</div></div>' +
          '<div class="dash-metric"><div class="num" style="font-size:18px;">' + formatarDias(dados.tempos.suprimentosParaFinanceiro) + '</div><div class="lbl">Suprimentos → aprovação Financeira</div></div>' +
          '<div class="dash-metric"><div class="num" style="font-size:18px;color:var(--amber);">' + formatarDias(dados.tempos.total) + '</div><div class="lbl">Tempo total (solicitação → aprovado)</div></div>' +
        '</div>' +

        (cardsMes ? '<h2 style="font-size:14px;color:var(--navy);margin:24px 0 10px 0;">Gasto por mês</h2><div class="dash-grid">' + cardsMes + '</div>' : '') +

        tabelaRanking('Top 5 fornecedores por valor gasto', dados.rankingFornecedorValor, formatarReais) +
        tabelaRanking('Top 5 fornecedores por frequência de compra', dados.rankingFornecedorFrequencia, function(v) { return v + 'x'; }) +

        blocoGrafico('Gasto por categoria', dados.gastoPorCategoria, '#256a3a', formatarReais) +
        blocoGrafico('% de cotações realizadas por comprador', dados.percentualPorComprador, '#378ADD', function(v) { return v + '%'; }) +
        blocoGrafico('Por status de cotação', dados.porStatusCotacao, 'var(--amber)') +
        blocoGrafico('Por status de compra', dados.porStatusCompra, 'var(--navy-light)') +
        blocoGrafico('Por categoria (quantidade de itens)', dados.porCategoria, '#5DCAA5');
    }

    function baixarDashboardPDF() {
      const el = document.getElementById('dashboardContainer');
      mostrarMsg('Gerando PDF...', 'ok');
      html2canvas(el, { scale: 2, backgroundColor: '#f4f6f8' }).then(function(canvas) {
        const imgData = canvas.toDataURL('image/png');
        const jsPDFLib = window.jspdf.jsPDF;
        const larguraMM = 210;
        const alturaMM = (canvas.height * larguraMM) / canvas.width;
        const pdf = new jsPDFLib('p', 'mm', [larguraMM, Math.max(alturaMM, 297)]);
        pdf.addImage(imgData, 'PNG', 0, 0, larguraMM, alturaMM);
        const dataStr = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
        pdf.save('Dashboard Central de Compras - ' + dataStr + '.pdf');
        mostrarMsg('PDF gerado.', 'ok');
      }).catch(function(erro) {
        mostrarMsg('Erro ao gerar PDF: ' + erro.message, 'err');
      });
    }
  </script>

  </div>
</body>
</html>
